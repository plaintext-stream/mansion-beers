[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 10
pm.max_spare_servers = 30
pm.max_requests = 500

pm.status_path = /status
ping.path = /ping
ping.response = pong

access.log = /proc/self/fd/2
slowlog = /proc/self/fd/2
request_terminate_timeout = 300

