services:
  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    restart: always
    ports:
      - 9080:80
      - 9443:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d/:/etc/nginx/conf.d/:ro
      - ./dummy_cert/:/var/cert/dummy/:ro
      - acme-sh_acme-sh_cert:/var/cert/:ro
      - wordpress_wordpress_data:/var/www/wordpress:ro
#       - typecho_typecho_data:/var/www/typecho:ro
    networks:
      - websrv

networks:
  websrv:
    external: true

volumes:
  acme-sh_acme-sh_cert:
    external: true
  wordpress_wordpress_data:
    external: true
#   typecho_typecho_data:
#     external: true

