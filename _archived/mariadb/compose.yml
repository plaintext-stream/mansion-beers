services:
  mariadb:
    image: mariadb:12
    restart: always
    container_name: mariadb
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/mariadb_root_password
    secrets:
      - mariadb_root_password
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - websrv

networks:
  websrv:
    external: true

secrets:
  mariadb_root_password:
    external: true

volumes:
  mariadb_data:

