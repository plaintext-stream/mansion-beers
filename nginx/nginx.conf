user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

include /etc/nginx/modules/*.conf;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" '
    'rt=$request_time uct="$upstream_connect_time" '
    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 64m;
    server_names_hash_bucket_size 128;

    client_body_buffer_size 128k;
    client_header_buffer_size 3m;
    large_client_header_buffers 4 256k;

    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_disable "MSIE [1-6]\.";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=strict:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    map $request_uri $is_dangerous {
        default 0;
        ~*union.*select 1;
        ~*\beval\b 1;
        ~*script.*alert 1;
        ~*\.\./\.\. 1;
        ~*\.(asp|aspx|php5?|jsp|cgi)\. 1;
        ~*proc/self/environ 1;
        ~*\bexec\b 1;
        ~*\bsystem\b 1;
        ~*\bshell_exec\b 1;
        ~*\bpassthru\b 1;
        ~*\bbase64_decode\b 1;
        ~*\bfile_get_contents\b 1;
        ~*\bfopen\b 1;
        ~*\bfwrite\b 1;
        ~*\bmysql_query\b 1;
        ~*\bselect.*from 1;
        ~*\binsert.*into 1;
        ~*\bdelete.*from 1;
        ~*\bdrop.*table 1;
        ~*\bcreate.*table 1;
        ~*\balter.*table 1;
    }

    map $http_user_agent $is_bad_bot {
        default 0;
        ~*sqlmap 1;
        ~*nikto 1;
        ~*nmap 1;
        ~*masscan 1;
        ~*nessus 1;
        ~*openvas 1;
        ~*vega 1;
        ~*burpsuite 1;
        ~*havij 1;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    server_tokens off;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        if ($is_dangerous) { return 403; }
        if ($is_bad_bot) { return 403; }
        if ($http_user_agent = "") { return 403; }
        if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS|PATCH)$) { return 405; }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        ssl_certificate /var/cert/dummy/public.crt;
        ssl_certificate_key /var/cert/dummy/private.key;

        if ($is_dangerous) { return 403; }
        if ($is_bad_bot) { return 403; }
        if ($http_user_agent = "") { return 403; }
        if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS|PATCH)$) { return 405; }

        limit_req zone=general burst=20 nodelay;
        limit_conn conn_limit_per_ip 10;

        add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;

        return 444;
    }

    include /etc/nginx/conf.d/*.conf;
}

